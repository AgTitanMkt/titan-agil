version: "3.8"

services:

  app:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: laravel_app
    restart: always
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../public:/var/www/public
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
